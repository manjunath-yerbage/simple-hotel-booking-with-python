<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Payment Details</h1>
    <p>Name: {{ name }}</p>
    <p>Phone: {{ phone }}</p>
    <p>City: {{ city }}</p>
    <p>Hotel: {{ hotel }}</p>
    <p>Room Type: {{ room_type|title }} Bed</p>
    <p>Rooms: {{ rooms }}</p>
    <p>Price per Room: ₹{{ price_per_room }}</p>
    <p><strong>Grand Total: ₹{{ total }}</strong></p>
    <form action="{{ url_for('thankyou') }}" method="post">
        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="phone" value="{{ phone }}">
        <input type="hidden" name="city" value="{{ city }}">
        <input type="hidden" name="hotel" value="{{ hotel }}">
        <input type="hidden" name="rooms" value="{{ rooms }}">
        <input type="hidden" name="room_type" value="{{ room_type }}">
        <label>Payment Method:</label><br>
        <input type="radio" name="payment_method" value="card" required> Credit/Debit Card<br>
        <input type="radio" name="payment_method" value="upi" required> UPI<br><br>
        <div id="card_details" style="display:none;">
            <label for="card_number">Card Number:</label>
            <input type="text" name="card_number" id="card_number">
            <label for="expiry">Expiry Date:</label>
            <input type="text" name="expiry" id="expiry" placeholder="MM/YY">
            <label for="cvv">CVV:</label>
            <input type="text" name="cvv" id="cvv">
        </div>
        <div id="upi_details" style="display:none;">
            <label for="upi_id">UPI ID:</label>
            <input type="text" name="upi_id" id="upi_id">
            <button type="button" onclick="alert('Fake QR Scanner: Scan successful!')">Scan QR Code</button>
        </div>
        <button type="submit">Pay Now</button>
    </form>
    <script>
        document.querySelectorAll('input[name="payment_method"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('card_details').style.display = this.value === 'card' ? 'block' : 'none';
                document.getElementById('upi_details').style.display = this.value === 'upi' ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
